kind = "web"
previewPath = "/"
title = "캠퍼스라이프 - 대학생 생활관리 앱"
version = "1.0.0"
id = "artifacts/campus-life"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25636

[services.development]
run = "pnpm --filter @workspace/campus-life run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-life", "run", "build" ]
publicDir = "artifacts/campus-life/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25636"
BASE_PATH = "/"
