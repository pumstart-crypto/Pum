packages:
  "date-fns": "For formatting and manipulating dates in the finance and schedule views"
  "clsx": "For conditional tailwind class merging"
  "tailwind-merge": "For conditional tailwind class merging"
  "framer-motion": "For page transitions and micro-interactions"
  "lucide-react": "For beautiful UI icons"

images:
  - path: "artifacts/campus-life/public/images/hero-campus.png"
    description: "A vibrant, 3D modern illustration of a university campus life, featuring a cute backpack, a coffee cup, and flying books. Bright pastel colors, soft lighting, clean gradient background."
    aspect_ratio: "16:9"
  - path: "artifacts/campus-life/public/images/food-banner.png"
    description: "A mouth-watering, stylized 3D illustration of various Korean street foods like tteokbokki, kimbap, and a cute coffee cup. Vibrant orange and yellow background."
    aspect_ratio: "16:9"

notes:
  - Hooks and types are imported directly from @workspace/api-client-react as specified
  - React Query invalidation uses the exact path strings generated by Orval (e.g. ['/api/schedule'])
  - No local hook wrappers are needed since the @workspace/api-client-react provides fully typed TanStack Query v5 hooks
